<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVerse — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/signup.css" />
</head>
<body>

  <!-- Ambient background particles -->
  <canvas id="particle-canvas"></canvas>

  <!-- Cinematic background glow orbs -->
  <div class="bg-orb bg-orb--gold"></div>
  <div class="bg-orb bg-orb--purple"></div>

  <!-- Film grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Page wrapper -->
  <div class="page-wrapper" id="page-wrapper">

    <!-- Brand bar -->
    <header class="brand-bar">
      <a href="#" class="brand-logo">
        <span class="brand-logo__icon">▶</span>
        <span class="brand-logo__text">CINEVERSE</span>
      </a>
    </header>

    <!-- Main auth card -->
    <main class="auth-stage">
      <div class="auth-card" id="auth-card">

        <!-- Card glow border -->
        <div class="auth-card__border"></div>

        <!-- Card inner content -->
        <div class="auth-card__inner">

          <!-- Heading -->
          <div class="auth-card__head">
            <h1 class="auth-card__title">Create Account</h1>
            <p class="auth-card__subtitle">Join millions of cinephiles on CineVerse</p>
          </div>

          <!-- Form -->
          <form class="auth-form" id="signup-form" novalidate>

            <!-- Full Name -->
            <div class="field-group" id="field-name">
              <label class="field-label" for="name">Full Name</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                </span>
                <input
                  class="field-input"
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Your full name"
                  autocomplete="name"
                  required
                />
              </div>
              <span class="field-error" id="name-error"></span>
            </div>

            <!-- Email -->
            <div class="field-group" id="field-email">
              <label class="field-label" for="email">Email Address</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
                </span>
                <input
                  class="field-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="your@email.com"
                  autocomplete="email"
                  required
                />
              </div>
              <span class="field-error" id="email-error"></span>
            </div>

            <!-- Password -->
            <div class="field-group" id="field-password">
              <label class="field-label" for="password">Password</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input
                  class="field-input"
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Create a password"
                  autocomplete="new-password"
                  required
                />
                <button type="button" class="field-toggle" id="toggle-password" aria-label="Toggle password visibility">
                  <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                </button>
              </div>
              <span class="field-error" id="password-error"></span>
              <!-- Password strength bar -->
              <div class="password-strength" id="password-strength" aria-hidden="true">
                <div class="strength-bar">
                  <div class="strength-bar__fill" id="strength-fill"></div>
                </div>
                <span class="strength-label" id="strength-label"></span>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="field-group" id="field-confirm">
              <label class="field-label" for="confirm-password">Confirm Password</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </span>
                <input
                  class="field-input"
                  type="password"
                  id="confirm-password"
                  name="confirm-password"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                  required
                />
                <button type="button" class="field-toggle" id="toggle-confirm" aria-label="Toggle confirm password visibility">
                  <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                </button>
              </div>
              <span class="field-error" id="confirm-error"></span>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn-primary" id="signup-btn">
              <span class="btn-primary__text">Create Account</span>
              <span class="btn-primary__spinner" aria-hidden="true"></span>
              <span class="btn-primary__shine"></span>
            </button>

          </form>

          <!-- Divider -->
          <div class="auth-divider">
            <span>or</span>
          </div>

          <!-- Footer link -->
          <p class="auth-footer-text">
            Already have an account?
            <a href="login.html" class="auth-link">Sign in</a>
          </p>

        </div>
      </div>
    </main>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>
  <script src="js/auth/config/api.js"></script>

  <script src="js/signup.js"></script>
 
</body>
</html>

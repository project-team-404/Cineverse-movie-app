<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVerse — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <!-- Ambient background particles -->
  <canvas id="particle-canvas"></canvas>

  <!-- Cinematic background glow orbs -->
  <div class="bg-orb bg-orb--gold"></div>
  <div class="bg-orb bg-orb--purple"></div>

  <!-- Film grain overlay -->
  <div class="grain-overlay"></div>

  <!-- Page wrapper -->
  <div class="page-wrapper" id="page-wrapper">

    <!-- Brand bar -->
    <header class="brand-bar">
      <a href="#" class="brand-logo">
        <span class="brand-logo__icon">▶</span>
        <span class="brand-logo__text">CINEVERSE</span>
      </a>
    </header>

    <!-- Main auth card -->
    <main class="auth-stage">
      <div class="auth-card" id="auth-card">

        <!-- Card glow border -->
        <div class="auth-card__border"></div>

        <!-- Card inner content -->
        <div class="auth-card__inner">

          <!-- Heading -->
          <div class="auth-card__head">
            <h1 class="auth-card__title">Welcome Back</h1>
            <p class="auth-card__subtitle">Sign in to continue your cinematic journey</p>
          </div>

          <!-- Form -->
          <form class="auth-form" id="login-form" novalidate>

            <!-- Email field -->
            <div class="field-group" id="field-email">
              <label class="field-label" for="email">Email Address</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
                </span>
                <input
                  class="field-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="your@email.com"
                  autocomplete="email"
                  required
                />
              </div>
              <span class="field-error" id="email-error"></span>
            </div>

            <!-- Password field -->
            <div class="field-group" id="field-password">
              <label class="field-label" for="password">Password</label>
              <div class="field-wrap">
                <span class="field-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input
                  class="field-input"
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="field-toggle" id="toggle-password" aria-label="Toggle password visibility">
                  <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                </button>
              </div>
              <span class="field-error" id="password-error"></span>
            </div>
            <div class="forgot-password">
    <a href="#" id="forgot-password-link">Forgot Password?</a>
</div>
            <!-- Submit button -->
            <button type="submit" class="btn-primary" id="login-btn">
              <span class="btn-primary__text">Sign In</span>
              <span class="btn-primary__spinner" aria-hidden="true"></span>
              <span class="btn-primary__shine"></span>
            </button>
           
          </form>

          <!-- Divider -->
          <div class="auth-divider">
            <span>or</span>
          </div>

          <!-- Footer link -->
          <p class="auth-footer-text">
            New to CineVerse?
            <a href="signup.html" class="auth-link">Create an account</a>
          </p>

        </div>
      </div>
    </main>

  </div>
           <div class="modal-overlay hidden" id="reset-modal">
  <div class="reset-modal">
    <div class="reset-modal__border"></div>
    <div class="reset-modal__inner">

      <div class="auth-card__head">
        <h2 class="auth-card__title">Reset Password</h2>
        <p class="auth-card__subtitle">Enter your details to set a new password.</p>
      </div>

      <div class="auth-form">

        <div class="field-group">
          <label class="field-label" for="request-id">Request ID</label>
          <div class="field-wrap">
            <span class="field-icon"><!-- your icon svg --></span>
            <input class="field-input" type="text" id="request-id" placeholder="e.g. REQ-00421">
          </div>
        </div>
<div class="field-group">
  <label class="field-label" for="new-password">New Password</label>
  <div class="field-wrap">
    <span class="field-icon"><!-- lock icon --></span>
    <input class="field-input" type="password" id="new-password" placeholder="New password">
    <button type="button" class="field-toggle" id="toggle-new-password" aria-label="Show password">
      <svg id="eye-new" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <svg id="eye-new-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>
</div>
<div class="field-group">
  <label class="field-label" for="confirm-new-password">Confirm Password</label>
  <div class="field-wrap">
    <span class="field-icon"><!-- lock icon --></span>
    <input class="field-input" type="password" id="confirm-new-password" placeholder="Confirm password">
    <button type="button" class="field-toggle" id="toggle-confirm-password" aria-label="Show password">
      <svg id="eye-confirm" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <svg id="eye-confirm-off" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>
</div>

        <div class="modal-actions">
          <button type="button" class="btn-primary" id="reset-password-btn">
            <div class="btn-primary__shine"></div>
            <span>Reset Password</span>
          </button>
          <button type="button" class="btn-ghost" id="cancel-reset">Cancel</button>
        </div>

      </div>
    </div>
  </div>
  
</div>
  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/login.js"></script>
  <script src="js/cv-api.js"></script>
  <script>
    function setupToggle(inputId, toggleId, eyeId, eyeOffId) {
      const input  = document.getElementById(inputId);
      const btn    = document.getElementById(toggleId);
      const eye    = document.getElementById(eyeId);
      const eyeOff = document.getElementById(eyeOffId);

      btn.addEventListener('click', () => {
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        eye.style.display    = isHidden ? 'none'  : 'block';
        eyeOff.style.display = isHidden ? 'block' : 'none';
        btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      });
    }

    setupToggle('new-password',         'toggle-new-password',     'eye-new',     'eye-new-off');
    setupToggle('confirm-new-password', 'toggle-confirm-password', 'eye-confirm', 'eye-confirm-off');
  </script>
</body>
</html>

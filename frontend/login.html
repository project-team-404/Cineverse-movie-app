<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — CineVerse</title>

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Navbar is injected at runtime by includeHTML.js -->
  <div id="navbar-root" data-include="navbar"></div>

  <main class="auth-page">
    <div class="auth-card">

      <a href="index.html" class="auth-logo">CineVerse</a>

      <h1 class="auth-title">Log in</h1>

      <form id="login-form" class="auth-form" novalidate>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
          >
          <span class="field-error" id="email-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
          >
          <span class="field-error" id="password-error" role="alert"></span>
        </div>

        <span class="form-error" id="form-error" role="alert"></span>

        <button type="submit" id="login-submit" class="btn-primary">
          <span class="btn-text">Log in</span>
          <span class="btn-loader" hidden></span>
        </button>

      </form>

      <p class="auth-switch">
        New to CineVerse? <a href="signup.html">Sign up</a>
      </p>

    </div>
  </main>

  <script type="module" src="js/utils/includeHTML.js"></script>
  <script type="module" src="js/auth/login.js"></script>

</body>
</html>
